<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Survey Data Cleaner</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <h1>Survey Data Cleaner</h1>
    <p>Upload a survey CSV file and choose the type of cleaner.</p>

    <form action="/upload" method="post" enctype="multipart/form-data" class="upload-form">
      <label for="file">Select CSV File:</label>
      <input type="file" id="file" name="file" accept=".csv" required>

      <label for="mode">Cleaning Mode:</label>
      <select id="mode" name="mode" required>
        <option value="discovery">Discovery</option>
        <option value="vce">VCE</option>
        <option value="vces">VCES</option>
      </select>

      <button type="submit">Upload &amp; Clean</button>
      <a href="{{ url_for('merge') }}" class="floating-merge-btn" title="Combine Discovery and VCE survey datasets into one file">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
    <path d="M6.75 3a.75.75 0 000 1.5h6.19l-1.72 1.72a.75.75 0 101.06 1.06l3-3a.75.75 0 000-1.06l-3-3a.75.75 0 10-1.06 1.06L12.94 3H6.75zM13.25 17a.75.75 0 000-1.5H7.06l1.72-1.72a.75.75 0 00-1.06-1.06l-3 3a.75.75 0 000 1.06l3 3a.75.75 0 001.06-1.06L7.06 17h6.19z" />
  </svg>
  <span>Dataset Merger</span>
</a>

    </form>
  </div>
</body>
</html>
